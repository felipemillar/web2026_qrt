<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Estamos construyendo la nueva imagen de QRT Solutions. Próximamente: Terminal SaaS Comercial y analítica cambiaria institucional.">
    <title>QRT Solutions | Nueva Imagen en Construcción</title>
    
    <!-- Google Fonts: Outfit (headings) and Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
    
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Custom Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        qrt: {
                            dark: '#030712',
                            slate: '#0b0f19',
                            emerald: '#10b981',
                            cyan: '#06b6d4',
                            indigo: '#6366f1'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif']
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen text-slate-300 overflow-hidden relative flex flex-col justify-between selection:bg-cyan-500/20 selection:text-cyan-200">

    <!-- Subtle Interactive Canvas for Brain Particles (Background) -->
    <canvas id="particles-canvas" class="absolute inset-0 w-full h-full pointer-events-none z-0"></canvas>

    <!-- Glowing Background Ambient Highlights (Extremely subtle, matching Boceto 1) -->
    <div class="absolute top-[15%] left-[10%] w-[40vw] h-[40vw] bg-indigo-600/5 rounded-full blur-[140px] pointer-events-none z-0 animate-float-slow" aria-hidden="true"></div>
    <div class="absolute bottom-[15%] right-[10%] w-[45vw] h-[45vw] bg-cyan-600/5 rounded-full blur-[150px] pointer-events-none z-0 animate-float-slow" aria-hidden="true"></div>

    <!-- Empty header to maintain layout balance -->
    <header class="relative z-10 w-full px-6 py-6"></header>

    <!-- Main Content Area -->
    <main class="relative z-10 flex-grow flex flex-col items-center justify-center px-6 text-center">
        <div class="max-w-xl w-full flex flex-col items-center space-y-12">
            
            <!-- Centered Logo -->
            <div class="relative group">
                <img src="assets/logo-blanco.png" alt="QRT Solutions Logo" class="h-48 sm:h-56 w-auto object-contain transition-all duration-700 hover:scale-105" id="logo-img">
            </div>

            <!-- 10th Anniversary Badge & Titles -->
            <div class="space-y-6 flex flex-col items-center">
                <div class="inline-flex items-center border border-slate-800 bg-slate-950/90 rounded-sm text-slate-400 px-4 py-1.5 text-[9px] font-mono tracking-widest select-none shadow-lg shadow-black/40">
                    EST. 2016
                </div>
                
                <div class="space-y-4">
                    <h1 class="text-3xl sm:text-4xl md:text-5xl font-extralight tracking-wide text-white font-heading leading-tight max-w-lg mx-auto">
                        La arquitectura detrás de las decisiones complejas.
                    </h1>
                </div>
            </div>

            <!-- Countdown Timer Area -->
            <div class="space-y-3">
                <p class="text-slate-500 text-[9px] uppercase font-bold tracking-[0.2em]">Estaremos listos en:</p>
                
                <div class="flex items-center gap-4 text-center justify-center">
                    <!-- Days -->
                    <div>
                        <div class="w-16 h-16 bg-slate-950/60 border border-cyan-500/20 shadow-[0_0_15px_rgba(6,182,212,0.06)] rounded-lg flex items-center justify-center text-3xl font-light text-white font-heading" id="timer-days">00</div>
                        <span class="text-[9px] text-slate-500 uppercase tracking-widest mt-2 block font-semibold">Days</span>
                    </div>
                    <div class="text-slate-700 text-2xl font-light pb-6">:</div>
                    <!-- Hours -->
                    <div>
                        <div class="w-16 h-16 bg-slate-950/60 border border-cyan-500/20 shadow-[0_0_15px_rgba(6,182,212,0.06)] rounded-lg flex items-center justify-center text-3xl font-light text-white font-heading" id="timer-hours">00</div>
                        <span class="text-[9px] text-slate-500 uppercase tracking-widest mt-2 block font-semibold">Horas</span>
                    </div>
                    <div class="text-slate-700 text-2xl font-light pb-6">:</div>
                    <!-- Minutes -->
                    <div>
                        <div class="w-16 h-16 bg-slate-950/60 border border-cyan-500/20 shadow-[0_0_15px_rgba(6,182,212,0.06)] rounded-lg flex items-center justify-center text-3xl font-light text-white font-heading" id="timer-minutes">00</div>
                        <span class="text-[9px] text-slate-500 uppercase tracking-widest mt-2 block font-semibold">Min</span>
                    </div>
                    <div class="text-slate-700 text-2xl font-light pb-6">:</div>
                    <!-- Seconds -->
                    <div>
                        <div class="w-16 h-16 bg-slate-950/60 border border-cyan-500/20 shadow-[0_0_15px_rgba(6,182,212,0.06)] rounded-lg flex items-center justify-center text-3xl font-light text-cyan-400 font-heading" id="timer-seconds">00</div>
                        <span class="text-[9px] text-slate-500 uppercase tracking-widest mt-2 block font-semibold">Sec</span>
                    </div>
                </div>
            </div>



        </div>
    </main>

    <!-- Footer -->
    <footer class="relative z-10 w-full px-6 py-6 flex justify-center text-center">
        <p class="text-[10px] text-slate-600 font-light">&copy; 2026 QRT Solutions. Todos los derechos reservados.</p>
    </footer>

    <!-- Javascript File Link -->
    <script src="app.js"></script>
</body>
</html>
